    <div

        Simple Todo List

      <form
        action=""

        id="todoForm"
      >
        <input
          type="text"
          class="w-full py-1 px-2 md:p-2 border border-slate-900 rounded-lg placeholder:text-sm md:placeholder:text-base"
          id="todoInput"
          placeholder="Add a new todo"
        />

          class="p-2 md:py-2 md:px-3 bg-slate-900 text-slate-200 border border-slate-200 rounded-lg hover:bg-slate-200 hover:text-slate-900 hover:border-slate-900 hover:border transition duration-200"
          id="addTodo"
          type="submit"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 448 512"
            class="w-5 h-5"
            fill="currentColor"
          >
            <!--! Font Awesome Free 6.5.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free (Icons: CC BY 4.0, Fonts: SIL OFL 1.1, Code: MIT License) Copyright 2024 Fonticons, Inc. -->

            />
          </svg>
        </button>
      </form>
